<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#1a2456"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="JFX Carrier"/>
  <title>JFX Carrier Inc</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>

  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800;900&display=swap');

  :root {
    --navy:    #1a2456;
    --navy2:   #0f1a40;
    --red:     #9b1b1b;
    --red2:    #b52020;
    --red3:    #cc2222;
    --white:   #ffffff;
    --bg:      #f4f5f7;
    --bg2:     #eaecf0;
    --card:    #ffffff;
    --border:  #dde1e9;
    --border2: #c8cdd8;
    --text:    #111827;
    --gray:    #6b7280;
    --lgray:   #9ca3af;
    --green:   #16a34a;
    --yellow:  #d97706;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Montserrat", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /*    LOGIN                                            */
  .login-screen {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--white);
    position: relative; overflow: hidden; padding: 24px;
  }
  .login-screen::before {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      -52deg, transparent, transparent 40px,
      rgba(26,36,86,0.025) 40px, rgba(26,36,86,0.025) 41px
    );
  }
  .login-screen::after {
    content: "";
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--navy) 0%, var(--red2) 100%);
  }

  .login-box { width: 100%; max-width: 400px; position: relative; z-index: 1; }

  .logo-block { text-align: center; margin-bottom: 36px; }
  .logo-img   { width: 220px; height: auto; display: block; margin: 0 auto; }
  .logo-tagline {
    font-size: 10px; font-weight: 700; letter-spacing: 4px;
    color: var(--lgray); text-transform: uppercase; margin-top: 10px;
  }
  .logo-dualbar { display: flex; justify-content: center; gap: 4px; margin-top: 12px; }
  .logo-dualbar .l1 { width: 36px; height: 3px; background: var(--navy); border-radius: 2px; }
  .logo-dualbar .l2 { width: 36px; height: 3px; background: var(--red2); border-radius: 2px; }

  /* login card */
  .login-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px;
    box-shadow: 0 4px 24px rgba(26,36,86,0.08), 0 1px 4px rgba(0,0,0,0.04);
  }

  .section-label {
    font-size: 9px; font-weight: 800; letter-spacing: 3px;
    text-transform: uppercase; color: var(--lgray); margin-bottom: 10px;
  }
  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .role-btn {
    padding: 14px 8px 10px;
    border: 1.5px solid var(--border);
    background: var(--bg); color: var(--gray);
    border-radius: 8px; cursor: pointer;
    font-family: "Montserrat", sans-serif;
    font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
    transition: all 0.18s;
    display: flex; flex-direction: column; align-items: center; gap: 7px;
  }
  .role-btn:hover { border-color: var(--navy); color: var(--navy); background: rgba(26,36,86,0.04); }
  .role-btn.active { border-color: var(--navy); background: rgba(26,36,86,0.07); color: var(--navy); box-shadow: 0 0 0 3px rgba(26,36,86,0.08); }
  .role-btn.active.role-red { border-color: var(--red2); background: rgba(155,27,27,0.06); color: var(--red2); box-shadow: 0 0 0 3px rgba(155,27,27,0.08); }
  .role-icon { font-size: 22px; }

  .input-group { margin-bottom: 14px; }
  .input-group label, .form-group label {
    display: block; font-size: 9px; font-weight: 800; color: var(--gray);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
  }
  .input-group input, .form-group input, .form-group select {
    width: 100%; padding: 12px 14px;
    background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: "Montserrat", sans-serif;
    font-size: 14px; font-weight: 500; outline: none;
    transition: border-color 0.18s, box-shadow 0.18s; -webkit-appearance: none;
  }
  .input-group input:focus, .form-group input:focus, .form-group select:focus {
    border-color: var(--navy); box-shadow: 0 0 0 3px rgba(26,36,86,0.1); background: var(--white);
  }
  .form-group select option { background: var(--white); }

  .btn-primary {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--navy) 0%, #253080 100%);
    border: none; border-radius: 8px; color: var(--white);
    font-family: "Montserrat", sans-serif; font-size: 12px; font-weight: 900;
    letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.18s;
    box-shadow: 0 4px 16px rgba(26,36,86,0.3); margin-top: 8px;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(26,36,86,0.4); }

  .btn-accent {
    width: 100%; padding: 12px 18px;
    background: linear-gradient(135deg, var(--red) 0%, var(--red2) 100%);
    border: none; border-radius: 8px; color: var(--white);
    font-family: "Montserrat", sans-serif; font-size: 11px; font-weight: 900;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    transition: all 0.18s; box-shadow: 0 4px 14px rgba(155,27,27,0.25); margin-top: 4px;
  }
  .btn-accent:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(155,27,27,0.35); }

  .btn-navy {
    width: 100%; padding: 12px 18px;
    background: linear-gradient(135deg, var(--navy) 0%, #253080 100%);
    border: none; border-radius: 8px; color: var(--white);
    font-family: "Montserrat", sans-serif; font-size: 11px; font-weight: 900;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    transition: all 0.18s; box-shadow: 0 4px 14px rgba(26,36,86,0.25); margin-top: 4px;
  }
  .btn-navy:hover { transform: translateY(-1px); }

  .btn-outline {
    padding: 9px 14px; background: transparent;
    border: 1.5px solid var(--border2); border-radius: 8px; color: var(--gray);
    font-family: "Montserrat", sans-serif; font-size: 10px; font-weight: 800;
    letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.18s;
  }
  .btn-outline:hover { border-color: var(--navy); color: var(--navy); }

  .btn-danger {
    padding: 6px 11px;
    background: rgba(155,27,27,0.07); border: 1.5px solid rgba(155,27,27,0.2);
    border-radius: 6px; color: var(--red2); font-size: 13px; cursor: pointer; transition: all 0.18s;
  }
  .btn-danger:hover { background: rgba(155,27,27,0.14); }

  /*    TOPBAR                                            */
  .topbar {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 0 16px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 8px rgba(26,36,86,0.07);
  }
  .topbar::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: linear-gradient(to bottom, var(--navy) 50%, var(--red2) 50%);
  }
  .topbar-logo-img { height: 38px; width: auto; display: block; padding-left: 8px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .badge { padding: 3px 9px; border-radius: 4px; font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; }
  .badge-manager  { background: rgba(155,27,27,0.1);  color: var(--red2);  border: 1.5px solid rgba(155,27,27,0.2); }
  .badge-billing  { background: rgba(22,163,74,0.1);  color: #16a34a; border: 1.5px solid rgba(22,163,74,0.2); }
  .badge-dispatch { background: rgba(26,36,86,0.1);   color: var(--navy);  border: 1.5px solid rgba(26,36,86,0.2); }
  .badge-driver   { background: rgba(217,119,6,0.1);  color: var(--yellow); border: 1.5px solid rgba(217,119,6,0.2); }
  .badge-owner    { background: rgba(16,163,74,0.1);  color: #16a34a; border: 1.5px solid rgba(16,163,74,0.2); }

  .icon-btn {
    background: var(--bg); border: 1.5px solid var(--border); color: var(--gray);
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; transition: all 0.18s;
  }
  .icon-btn:hover { border-color: var(--navy); color: var(--navy); }

  /*    BOTTOM NAV                                        */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white); border-top: 1px solid var(--border);
    display: flex; z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
    box-shadow: 0 -2px 12px rgba(26,36,86,0.07);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 9px 4px 7px; cursor: pointer; color: var(--lgray);
    font-size: 8px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;
    transition: color 0.18s; border: none; background: transparent; position: relative;
  }
  .nav-item .ni { font-size: 19px; margin-bottom: 3px; }
  .nav-item.active { color: var(--navy); }
  .nav-item.active::before {
    content: ""; position: absolute; top: 0; left: 15%; right: 15%;
    height: 2px; background: linear-gradient(90deg, var(--navy), var(--red2));
    border-radius: 0 0 3px 3px;
  }

  /*    MAIN                                              */
  .main { flex: 1; padding: 18px 14px 82px; }

  /*    CARDS                                             */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px; margin-bottom: 12px; position: relative; overflow: hidden;
    box-shadow: 0 1px 6px rgba(26,36,86,0.06);
  }
  .card.accent-l::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(to bottom, var(--navy), var(--red2));
  }
  .card.accent-l { padding-left: 21px; }

  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-family: "Bebas Neue", sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--text); }
  .card-sub { font-size: 10px; color: var(--lgray); margin-top: 2px; font-weight: 600; }

  /*    STATS                                             */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 12px; position: relative; overflow: hidden;
    box-shadow: 0 1px 4px rgba(26,36,86,0.05);
  }
  .stat-card::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; }
  .stat-card.s-red::after    { background: linear-gradient(90deg, var(--red), var(--red3)); }
  .stat-card.s-green::after  { background: var(--green); }
  .stat-card.s-yellow::after { background: var(--yellow); }
  .stat-card.s-navy::after   { background: var(--navy); }

  .stat-label { font-size: 8px; font-weight: 800; color: var(--lgray); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-family: "Bebas Neue", sans-serif; font-size: 26px; letter-spacing: 1px; line-height: 1; }
  .sv-red    { color: var(--red2); }
  .sv-green  { color: var(--green); }
  .sv-yellow { color: var(--yellow); }
  .sv-navy   { color: var(--navy); }
  .sv-text   { color: var(--text); }

  /*    WEEK BADGE                                        */
  .week-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--white); border: 1px solid var(--border);
    border-left: 3px solid var(--navy);
    border-radius: 6px; padding: 6px 12px; font-size: 10px; font-weight: 700;
    color: var(--gray); letter-spacing: 1px; margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(26,36,86,0.06);
  }

  /*    SUMMARY ROWS                                      */
  .summary-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0; border-bottom: 1px solid var(--bg2); font-size: 13px;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .lbl { color: var(--gray); font-weight: 500; }
  .summary-row .val { font-weight: 700; }
  .summary-row.deduct .val { color: var(--red2); }
  .summary-row.gross  .val { color: var(--yellow); }
  .summary-row.total  .lbl { font-family: "Bebas Neue", sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--text); }
  .summary-row.total  .val { font-family: "Bebas Neue", sans-serif; font-size: 24px; color: var(--green); }

  .divider { height: 1px; background: var(--bg2); margin: 12px 0; }

  /*    LOAD ITEMS                                        */
  .load-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 13px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 11px;
    box-shadow: 0 1px 4px rgba(26,36,86,0.05);
    transition: box-shadow 0.18s;
  }
  .load-item:hover { box-shadow: 0 4px 12px rgba(26,36,86,0.1); }
  .load-icon {
    width: 40px; height: 40px;
    background: rgba(26,36,86,0.08); border: 1px solid rgba(26,36,86,0.15);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 19px; flex-shrink: 0;
  }
  .load-info { flex: 1; min-width: 0; }
  .load-route { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .load-meta  { font-size: 10px; color: var(--lgray); margin-top: 3px; font-weight: 600; }
  .load-right { text-align: right; flex-shrink: 0; }
  .load-amount { font-family: "Bebas Neue", sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--green); }
  .load-miles  { font-size: 9px; color: var(--lgray); font-weight: 700; letter-spacing: 1px; }

  /*    FORM                                              */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { margin-bottom: 11px; }

  /*    CHIPS                                             */
  .chip { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  .chip-navy { background: rgba(26,36,86,0.1); color: var(--navy); border: 1px solid rgba(26,36,86,0.18); }
  .chip-red  { background: rgba(155,27,27,0.1); color: var(--red2); border: 1px solid rgba(155,27,27,0.18); }

  /*    SECTION TITLE                                     */
  .sec-title { font-family: "Bebas Neue", sans-serif; font-size: 14px; letter-spacing: 3px; color: var(--lgray); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .sec-title::after { content: ""; flex: 1; height: 1px; background: var(--bg2); }

  /*    EMPTY STATE                                       */
  .empty-state { text-align: center; padding: 44px 20px; color: var(--lgray); }
  .empty-icon  { font-size: 48px; margin-bottom: 14px; opacity: 0.35; }
  .empty-text  { font-size: 13px; font-weight: 600; }

  /*    MODAL                                              */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,36,86,0.5); z-index: 200;
    display: flex; align-items: flex-end; animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-sheet {
    background: var(--white); border-top: 3px solid var(--navy);
    border-radius: 16px 16px 0 0; width: 100%;
    padding: 18px 14px 40px;
    animation: slideUp 0.3s cubic-bezier(.16,1,.3,1);
    max-height: 92vh; overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(26,36,86,0.15);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 34px; height: 4px; background: var(--bg2); border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-family: "Bebas Neue", sans-serif; font-size: 22px; letter-spacing: 3px; margin-bottom: 14px; color: var(--text); }

  /*    PDF                                                */
  .pdf-preview {
    background: #f9f9f9; color: #111; border-radius: 8px; border: 1px solid var(--border);
    padding: 20px 16px; font-family: "Montserrat", sans-serif; font-size: 11px;
    margin-bottom: 12px; max-height: 50vh; overflow-y: auto;
  }
  .pdf-header { text-align: center; margin-bottom: 12px; }
  .pdf-logo-img { height: 52px; width: auto; margin: 0 auto 4px; display: block; }
  .pdf-tagline { font-size: 8px; font-weight: 800; letter-spacing: 3px; color: #888; text-transform: uppercase; }
  .pdf-dualbar { height: 3px; background: linear-gradient(90deg, #1a2456 50%, #9b1b1b 50%); margin: 10px 0; border-radius: 2px; }
  .pdf-meta { display: flex; justify-content: space-between; font-size: 9px; color: #666; font-weight: 700; margin-bottom: 10px; }
  .pdf-sec { font-family: "Bebas Neue", sans-serif; font-size: 12px; letter-spacing: 2px; background: #111; color: #fff; padding: 4px 8px; border-radius: 3px; margin: 8px 0 6px; }
  .pdf-sec.red  { background: #9b1b1b; }
  .pdf-sec.navy { background: #1a2456; }
  .pdf-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #ebebeb; font-size: 10px; }
  .pdf-row:last-child { border-bottom: none; }
  .pdf-total { display: flex; justify-content: space-between; background: #eef0f6; padding: 8px 10px; border-radius: 4px; font-weight: 900; font-size: 13px; margin-top: 8px; border-left: 3px solid #1a2456; }
  .pdf-green { color: #16a34a; }
  .pdf-red   { color: #9b1b1b; font-weight: 700; }

  .role-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:14px 8px 10px;border:2px solid #e5e7eb;border-radius:14px;background:#fff;cursor:pointer;transition:all 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
  .role-btn:hover,.role-btn.active{border-color:#1a2456;background:rgba(26,36,86,0.04);transform:translateY(-2px);box-shadow:0 4px 14px rgba(26,36,86,0.12);}
  .role-btn.active{box-shadow:0 0 0 3px rgba(26,36,86,0.15),0 4px 14px rgba(26,36,86,0.12);}
  label{display:block;font-size:11px;font-weight:700;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;margin-top:0;}
  input,select{display:block;width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:Montserrat,sans-serif;font-weight:500;color:#111;background:#fafafa;box-sizing:border-box;margin-bottom:0;transition:border-color 0.2s;}
  input:focus,select:focus{outline:none;border-color:#1a2456;background:#fff;box-shadow:0 0 0 3px rgba(26,36,86,0.08);}
  </style>
</head>

function fmt(n){return "$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function getWeek(){
  var now=new Date(),day=now.getDay(),dSinceTue=(day+5)%7;
  var tue=new Date(now);tue.setDate(now.getDate()-dSinceTue);
  var mon=new Date(tue);mon.setDate(tue.getDate()+6);
  return tue.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" - "+mon.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}
function myLoads(){
  if(!state.user) return state.loads;
  if(state.user.role==="driver") return state.loads.filter(function(l){return l.driver===state.user.driver;});
  if(state.user.role==="owner") return state.loads.filter(function(l){return l.driver===state.user.ownerData.driver;});
  return state.loads;
}
function calcFin(loads){
  var g=loads.reduce(function(s,l){return s+l.rate;},0);
  var d=loads.reduce(function(s,l){return s+l.diesel;},0);
  return {gross:g,diesel:d,d10:g*0.10,d30:g*0.30,ins:250,net:g-g*0.10-g*0.30-250-d};
}

  var u=state.user;
  if(u.role==="driver"||u.role==="owner"){
    var d=u.role==="owner"?u.ownerData.driver:u.driver;
    var dl=loads.filter(function(l){return l.driver===d;});
    var dg=dl.reduce(function(s,l){return s+l.rate;},0);
    var dm=dl.reduce(function(s,l){return s+l.miles;},0);
    return "<div class='card'>"
      +"<div class='card-title' style='margin-bottom:10px'>"+d+"</div>"
      +"<div class='stats-grid'>"
        +"<div class='stat-card s-yellow'><div class='stat-label'>Gross</div><div class='stat-value sv-yellow'>"+fmt(dg)+"</div></div>"
        +"<div class='stat-card s-green'><div class='stat-label'>Pay (30%)</div><div class='stat-value sv-green'>"+fmt(dg*0.30)+"</div></div>"
        +"<div class='stat-card s-navy'><div class='stat-label'>Loads</div><div class='stat-value sv-navy'>"+dl.length+"</div></div>"
        +"<div class='stat-card s-red'><div class='stat-label'>Miles</div><div class='stat-value sv-red'>"+dm.toLocaleString()+"</div></div>"
      +"</div>"
    +"</div>";
  }
  return "<div>"+DRIVERS.map(function(d){
    var dl=state.loads.filter(function(l){return l.driver===d;});
    var dg=dl.reduce(function(s,l){return s+l.rate;},0);
    var dm=dl.reduce(function(s,l){return s+l.miles;},0);
    return "<div class='card'>"
      +"<div class='card-title' style='margin-bottom:10px'>"+d+"</div>"
      +"<div class='stats-grid'>"
        +"<div class='stat-card s-yellow'><div class='stat-label'>Gross</div><div class='stat-value sv-yellow'>"+fmt(dg)+"</div></div>"
        +"<div class='stat-card s-green'><div class='stat-label'>Pay (30%)</div><div class='stat-value sv-green'>"+fmt(dg*0.30)+"</div></div>"
        +"<div class='stat-card s-navy'><div class='stat-label'>Loads</div><div class='stat-value sv-navy'>"+dl.length+"</div></div>"
        +"<div class='stat-card s-red'><div class='stat-label'>Miles</div><div class='stat-value sv-red'>"+dm.toLocaleString()+"</div></div>"
      +"</div>"
    +"</div>";
  }).join("")+"</div>";
}

function trucksHTML(){
  if(state.user.role!=="manager") return "";
  return "<div>"+state.trucks.map(function(t){
    var ms=t.mi-t.oilMi,pct=Math.min(ms/13000*100,100);
    var oc=ms>=13000?"#9b1b1b":ms>=12500?"#d97706":"#16a34a";
    return "<div class='card'>"
      +"<div style='font-weight:900;font-size:16px;margin-bottom:4px'>"+t.unit+" - "+t.make+" "+t.model+"</div>"
      +"<div style='font-size:11px;color:#9ca3af;margin-bottom:10px'>"+t.year+" &middot; "+t.plate+" &middot; "+t.driver+"</div>"
      +"<div class='stats-grid' style='margin-bottom:10px'>"
        +"<div class='stat-card s-navy'><div class='stat-label'>Total Mi</div><div class='stat-value sv-navy' style='font-size:20px'>"+t.mi.toLocaleString()+"</div></div>"
        +"<div class='stat-card' style='border-bottom:3px solid "+oc+"'><div class='stat-label'>Desde Aceite</div><div class='stat-value' style='font-size:20px;color:"+oc+"'>"+ms.toLocaleString()+"</div></div>"
      +"</div>"
      +"<div style='background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px;margin-bottom:10px'>"
        +"<div style='display:flex;justify-content:space-between;margin-bottom:5px'>"
          +"<span style='font-size:11px;font-weight:800;color:"+oc+"'>ACEITE</span>"
          +"<span style='font-size:11px;font-weight:700;color:"+oc+"'>"+(ms>=13000?"VENCIDO!":"Faltan "+(13000-ms).toLocaleString()+" mi")+"</span>"
        +"</div>"
        +"<div style='background:#e5e7eb;border-radius:999px;height:8px;overflow:hidden'>"
          +"<div style='height:100%;width:"+pct+"%;background:"+oc+";border-radius:999px'></div>"
        +"</div>"
      +"</div>"
      +"<div style='display:flex;gap:8px;align-items:flex-end'>"
        +"<div style='flex:1'><label>Actualizar millas</label><input type='number' id='uMi"+t.id+"' placeholder='"+t.mi+"' style='margin-bottom:0'/></div>"
        +"<button style='padding:10px;background:#d97706;border:none;border-radius:8px;color:white;font-size:11px;font-weight:800;cursor:pointer' onclick='oilChange("+t.id+")'>Cambio Aceite</button>"
      +"</div>"
    +"</div>";
  }).join("")+"</div>";
}

function supportHTML(){
  return "<div class='card'>"
    +"<div style='text-align:center;padding:20px 0'>"
      +"<div style='font-size:48px;margin-bottom:12px'>&#128666;</div>"
      +"<div style='font-family:Bebas Neue,sans-serif;font-size:28px;letter-spacing:4px;color:#1a2456'>JFX <span style='color:#9b1b1b'>CARRIER</span></div>"
      +"<div style='font-size:11px;color:#9ca3af;margin-top:4px'>Built by operators, for operators</div>"
      +"<div style='margin-top:20px;font-size:13px;color:#6b7280'>Para soporte: soporte@jfxcarrier.com</div>"
    +"</div>"
  +"</div>";
}

function receiptsHTML(){
  if(state.user.role!=="driver") return "";
  var myR=state.receipts.filter(function(r){return r.driver===state.user.driver;});
  var tot=myR.reduce(function(s,r){return s+(+r.amount||0);},0);
  var items=myR.slice().reverse().map(function(r){
    return "<div class='load-item'>"
      +"<div class='load-icon'>"+(r.type==="scale"?"&#9878;":r.type==="diesel"?"&#9981;":"&#128295;")+"</div>"
      +"<div class='load-info'><div class='load-route'>"+r.description+"</div><div class='load-meta'>"+r.date+"</div></div>"
      +"<div class='load-amount' style='color:#9b1b1b'>-"+fmt(r.amount)+"</div>"
    +"</div>";
  }).join("");
  return "<div>"
    +"<div class='card' style='margin-bottom:14px'>"
      +"<div class='card-title' style='margin-bottom:12px'>Subir Gasto</div>"
      +"<label>Tipo</label><select id='rType'><option value='scale'>Scale</option><option value='maintenance'>Mantenimiento</option><option value='diesel'>Diesel</option></select>"
      +"<label>Monto ($)</label><input type='number' id='rAmt' placeholder='0.00'/>"
      +"<label>Descripcion</label><input id='rDesc' placeholder='Scale ticket...'/>"
      +"<button class='btn btn-red' onclick='addReceipt()'>Guardar</button>"
    +"</div>"
    +(myR.length>0?"<div class='card'><div class='card-title' style='margin-bottom:8px'>Total Gastos: "+fmt(tot)+"</div>"+items+"</div>":"")
  +"</div>";
}

function setRole(r){state.role=r;render();}
function setTab(t){state.tab=t;render();}
function doLogout(){state.user=null;render();}

function doLogin(){
  var p=el("pInput")?el("pInput").value:"";
  var sn=el("sName")?el("sName").value:"";
  if(!p){alert("Ingresa tu contrasena");return;}
  if(state.role==="owner"){
    var o=state.owners.find(function(x){return x.name===sn&&x.password===p;});
    if(!o){alert("Nombre o contrasena incorrectos");return;}
    state.user={role:"owner",name:o.name,ownerData:o};
  } else if(state.role==="driver"){
    state.user={role:"driver",name:sn,driver:sn};
    state.showMileEntry=true;
    render();return;
  } else {
    state.user={role:state.role,name:sn||("JFX "+state.role)};
  }
  state.tab="dashboard";render();
}

function doMiles(){
  var v=el("miIn")?el("miIn").value:"";
  if(!v){alert("Ingresa tus millas");return;}
  var t=state.trucks.find(function(x){return x.driver===state.user.driver;});
  if(t){state.trucks=state.trucks.map(function(x){return x.id===t.id?Object.assign({},x,{mi:Math.max(x.mi,+v)}):x;});}
  state.showMileEntry=false;state.tab="dashboard";render();
}

function addLoad(){
  var from=el("fFrom").value,to=el("fTo").value;
  var mi=el("fMi").value,rate=el("fRate").value;
  if(!from||!to||!mi||!rate){alert("Completa los campos requeridos");return;}
  state.loads.push({
    id:Date.now(),from:from,to:to,miles:+mi,rate:+rate,
    diesel:+(el("fDiesel").value)||0,driver:el("fDriver").value,
    date:new Date().toISOString().split("T")[0],by:state.user.name,
    pickupDate:el("fPD").value||"",pickupTime:el("fPT").value||"",
    deliveryDate:el("fDD").value||"",deliveryTime:el("fDT").value||"",
    notes:el("fNotes").value||""
  });
  render();
}

function delLoad(id){state.loads=state.loads.filter(function(l){return l.id!==id;});render();}

function oilChange(tid){
  if(!confirm("Confirmar cambio de aceite?")) return;
  state.trucks=state.trucks.map(function(t){return t.id===tid?Object.assign({},t,{oilMi:t.mi}):t;});
  render();
}

function addReceipt(){
  var amt=el("rAmt").value;
  if(!amt){alert("Ingresa el monto");return;}
  state.receipts.push({
    id:Date.now(),driver:state.user.driver,type:el("rType").value,
    amount:+amt,description:el("rDesc").value||el("rType").value,
    date:new Date().toLocaleDateString("en-US")
  });
  render();
}

function printWeekly(){
  var loads=myLoads(),fin=calcFin(loads);
  var w=window.open("","_blank");
  var rows=loads.map(function(l){
    return "<tr><td>"+l.from+" to "+l.to+"</td><td>"+l.miles+"</td><td>$"+l.rate.toLocaleString()+"</td><td>"+l.driver+"</td><td>$"+l.diesel.toLocaleString()+"</td></tr>";
  }).join("");
  w.document.write("<!DOCTYPE html><html><head><meta charset='UTF-8'><title>JFX Report</title>"
    +"<style>body{font-family:Arial,sans-serif;padding:32px;max-width:700px;margin:0 auto}"
    +"h1{font-size:28px;color:#1a2456}span.r{color:#9b1b1b}"
    +"table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}"
    +"th{background:#1a2456;color:white;padding:8px;text-align:left}"
    +"td{padding:8px;border-bottom:1px solid #f0f0f0}"
    +".row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee;font-size:13px}"
    +".tot{display:flex;justify-content:space-between;background:#eef0f6;padding:14px;border-radius:6px;font-weight:900;font-size:16px;margin-top:12px}"
    +"@media print{button{display:none}}</style></head><body>"
    +"<h1>JFX <span class='r'>CARRIER</span></h1>"
    +"<p>"+getWeek()+" - "+loads.length+" loads</p>"
    +"<button onclick='window.print()' style='padding:10px 20px;background:#1a2456;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:800;margin-bottom:16px'>Print / Save PDF</button>"
    +"<table><thead><tr><th>Route</th><th>Miles</th><th>Rate</th><th>Driver</th><th>Diesel</th></tr></thead><tbody>"+rows+"</tbody></table>"
    +"<div class='row'><span>Gross Revenue</span><span style='color:#d97706;font-weight:700'>"+fmt(fin.gross)+"</span></div>"
    +"<div class='row'><span>Dispatch (10%)</span><span style='color:#9b1b1b'>-"+fmt(fin.d10)+"</span></div>"
    +"<div class='row'><span>Driver Pay (30%)</span><span style='color:#9b1b1b'>-"+fmt(fin.d30)+"</span></div>"
    +"<div class='row'><span>Insurance</span><span style='color:#9b1b1b'>-$250.00</span></div>"
    +"<div class='row'><span>Diesel</span><span style='color:#9b1b1b'>-"+fmt(fin.diesel)+"</span></div>"
    +"<div class='tot'><span>NET PROFIT</span><span style='color:#16a34a'>"+fmt(fin.net)+"</span></div>"
    +"<p style='text-align:center;font-size:10px;color:#aaa;margin-top:32px'>JFX CARRIER INC - Built by operators, for operators</p>"
    +"</body></html>");
  w.document.close();
}

function exportCSV(){
  var loads=myLoads();
  var header="From,To,Miles,Rate,Diesel,Driver,Date\n";
  var rows=loads.map(function(l){
    return [l.from,l.to,l.miles,l.rate,l.diesel,l.driver,l.date].join(",");
  }).join("\n");
  var a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(header+rows);
  a.download="JFX_Report.csv";
  a.click();
}

render();

</script>
