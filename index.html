<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>JFX Test</title>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    function App() {
      const [count, setCount] = React.useState(0);
      return React.createElement("div", {style:{textAlign:"center",marginTop:100,fontFamily:"Arial"}},
        React.createElement("h1", {style:{color:"#1a2456"}}, "🚚 JFX CARRIER"),
        React.createElement("p", {style:{color:"#9b1b1b",marginTop:10}}, "React funciona correctamente"),
        React.createElement("button", {
          onClick: () => setCount(count+1),
          style:{marginTop:20,padding:"10px 20px",background:"#1a2456",color:"white",border:"none",borderRadius:8,fontSize:16,cursor:"pointer"}
        }, "Taps: " + count)
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
